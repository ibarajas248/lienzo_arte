<!DOCTYPE colhtml>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lienzo Colaborativo Premium</title>
    <meta name="description" content="Un lienzo de dibujo en tiempo real, elegante y fluido.">
    <!-- Google Fonts para tipografía premium -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    
    <!-- Pantalla de Login Overlay -->
    <div class="login-overlay" id="login-overlay">
        <div class="login-card">
            <h2>Lienzo Colaborativo</h2>
            <p>Inicia sesión para empezar a dibujar</p>
            <button id="google-login-btn" class="google-btn">
                <svg width="18" height="18" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48"><path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/><path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/><path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/><path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/><path fill="none" d="M0 0h48v48H0z"/></svg>
                Iniciar sesión con Google
            </button>
        </div>
    </div>

    <!-- Lienzo -->
    <canvas id="drawing-canvas"></canvas>

    <!-- UI Overlay (Glassmorphism) -->
    <div class="toolbar" id="toolbar">
        <h1 class="app-title">Lienzo Colaborativo</h1>
        
        <div class="tools-container">
            <div class="tool-group">
                <label for="color-picker">Color</label>
                <div class="color-wrapper">
                    <input type="color" id="color-picker" value="#00ffcc">
                </div>
            </div>

            <div class="tool-group">
                <label for="size-slider">Grosor (<span id="size-value">5</span>px)</label>
                <input type="range" id="size-slider" min="1" max="50" value="5">
            </div>

            <div class="tool-group">
                <button id="eraser-btn" class="tool-btn" title="Borrador">
                    <svg viewBox="0 0 24 24" width="20" height="20" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round" class="css-i6dzq1"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"></path><polyline points="7.5 4.21 12 6.81 16.5 4.21"></polyline><polyline points="7.5 19.79 7.5 14.6 3 12"></polyline><polyline points="21 12 16.5 14.6 16.5 19.79"></polyline><polyline points="3.27 6.96 12 12.01 20.73 6.96"></polyline><line x1="12" y1="22.08" x2="12" y2="12"></line></svg>
                    Borrador
                </button>
            </div>

            <div class="tool-group">
                <button id="clear-btn" class="tool-btn danger" title="Limpiar Lienzo">
                    <svg viewBox="0 0 24 24" width="20" height="20" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round" class="css-i6dzq1"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path><line x1="10" y1="11" x2="10" y2="17"></line><line x1="14" y1="11" x2="14" y2="17"></line></svg>
                </button>
            </div>
        </div>

        <div class="status-indicator">
            <span id="connection-status" class="status-dot connected"></span>
            <span id="status-text">Conectado</span>
        </div>
    </div>

    <!-- Script de Socket.io provisto por el backend -->
    <script src="/socket.io/socket.io.js"></script>
    <script type="module" src="app.js"></script>
</body>
</html>
